<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f4f4;
  font-family:'Poppins',sans-serif;
  perspective:1500px;
  padding:0;
}

/* Book container */
.book{
  width:100%;
  max-width:800px;
  position:relative;
}

/* Pages */
.page{
  width:100%;
  position:absolute;
  top:0;
  left:0;
  overflow:hidden;
  box-shadow:0 15px 50px rgba(0,0,0,0.2);
  transform-origin:left;
  transition:transform 3s ease-in-out;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Front page */
.front{
  z-index:2;
}

/* Back page */
.back{
  transform:rotateY(180deg);
}

/* Flip animation */
.book.flip .front{
  transform:rotateY(-180deg);
}

.book.flip .back{
  transform:rotateY(0deg);
}

/* Images: full image visible */
.page img{
  width:100%;
  height:100%;
  object-fit:contain; /* shows full image */
}

/* Mobile */
@media (max-width:600px){
  .book{
    max-width:90%;
  }
}
</style>

</head>

<body>

<div class="book" id="book">

    <!-- Cover -->
    <div class="page front">
        <img src="Seven.png" alt="Wedding Cover">
    </div>

    <!-- Details -->
    <div class="page back">
        <img src="21.png" alt="Wedding Details">
    </div>

</div>

<script>
// Flip after 7 seconds
setTimeout(() => {
    document.getElementById("book").classList.add("flip");
}, 3000);
</script>

</body>
</html>
